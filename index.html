<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="auth-page">
    <div class="auth-card">
      <h1>Sign in</h1>
      <p class="subtitle">Enter your 10-digit Indian mobile number. We will send a one-time code.</p>
      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="phone">Phone number</label>
          <div class="phone-input-row" role="group" aria-label="Phone number, India +91">
            <span class="phone-prefix">+91</span>
            <input
              id="phone"
              name="phone"
              type="tel"
              inputmode="numeric"
              autocomplete="tel-national"
              maxlength="10"
              placeholder="98765 43210"
              required
            />
          </div>
        </div>
        <button type="submit" class="btn" id="login-submit">Continue</button>
        <div class="error-msg" id="login-error" role="alert"></div>
      </form>
    </div>
    <script src="js/auth_storage.js"></script>
    <script src="js/login.js"></script>
  </body>
</html>
